
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invitación Emy</title>

  <style>
    :root{
      --w: 1080;
      --h: 1920;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#0b0b12;
      overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Marco tipo “pantalla de celular” responsivo */
    .stage{
      width:min(420px, 100vw);
      aspect-ratio: 9 / 16;
      position:relative;
      overflow:hidden;
      border-radius: 18px;
      box-shadow: 0 16px 50px rgba(0,0,0,.55);
      background:#000;
    }

    /* Capas */
    .layer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* Fondo */
    .bg{ transform: translateZ(0); }

    /* Luces flotando hacia arriba */
    .lights{
      opacity: .95;
      animation: floatUp 9s linear infinite;
      transform: translateY(18px);
      filter: drop-shadow(0 0 10px rgba(255,220,140,.25));
    }
    @keyframes floatUp{
      0%   { transform: translateY(28px); }
      100% { transform: translateY(-28px); }
    }

    /* Pétalos con brisita hacia un costado (lento y elegante) */
    .petals{
      opacity: .9;
      animation: breeze 7s ease-in-out infinite;
      transform: translateX(0) translateY(0);
      filter: drop-shadow(0 0 8px rgba(255,200,210,.18));
    }
    @keyframes breeze{
      0%   { transform: translateX(-10px) translateY(0); }
      50%  { transform: translateX(10px) translateY(6px); }
      100% { transform: translateX(-10px) translateY(0); }
    }

    /* Muñeca/barco: movimiento sutil (cabello “vivo”) */
    .princess{
      animation: hairSway 3.8s ease-in-out infinite;
      transform-origin: 55% 55%;
      will-change: transform;
    }
    @keyframes hairSway{
      0%   { transform: translateY(0) rotate(-0.25deg); }
      50%  { transform: translateY(2px) rotate(0.35deg); }
      100% { transform: translateY(0) rotate(-0.25deg); }
    }

    /* Título: aparece elegante */
    .title{
      animation: reveal 1.4s ease-out 0.25s both;
      transform-origin: 50% 75%;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.35));
    }
    @keyframes reveal{
      0%   { opacity:0; transform: translateY(18px) scale(.96); }
      100% { opacity:1; transform: translateY(0) scale(1); }
    }

    /* Para que el orden de capas sea el correcto */
    .z1{ z-index:1; }  /* background */
    .z2{ z-index:2; }  /* lights */
    .z3{ z-index:3; }  /* petals */
    .z4{ z-index:4; }  /* princess */
    .z5{ z-index:5; }  /* title */

  </style>
</head>

<body>
  <main class="stage" aria-label="Portada invitación">
    <img class="layer bg z1" src="background_castillo.png" alt="Fondo castillo" />

    <img class="layer lights z2" src="luces_flotantes.png" alt="Luces flotantes" />

    <img class="layer petals z3" src="petalos_brisita.png" alt="Pétalos" />

    <img class="layer princess z4" src="princesa_barco.png" alt="Muñeca en barco" />

    <img class="layer title z5" src="titulo_evento.png" alt="Título del evento" />
  </main>
</body>
</html>
