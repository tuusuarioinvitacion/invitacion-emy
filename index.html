<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Emy Summer</title>
    <style>
        /* Estilos básicos */
        body {
            font-family: Arial, sans-serif;
            background: #f0e6f7;
            text-align: center;
        }
        .header {
            background-color: #8e44ad;
            color: #fff;
            padding: 20px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin: 0;
        }
        .image-container {
            margin-top: 50px;
        }
        img {
            width: 80%;
            max-width: 500px;
            margin: 20px 0;
        }
        .footer {
            margin-top: 40px;
            font-size: 1rem;
            color: #8e44ad;
        }
    </style>
</head>
<body>

    <!-- Encabezado -->
    <div class="header">
        <h1>¡Estás invitado al primer año de Emy Summer!</h1>
    </div>

    <!-- Imagen principal -->
    <div class="image-container">
        <img src="https://raw.githubusercontent.com/tuusuarioinvitacion/invitacion-emysummer/main/princesa_barco.png" alt="Princesa en barco">
    </div>

    <!-- Texto de la invitación -->
    <div class="footer">
        <p>Mi primer año está por llegar, ven y acompáñame en esta celebración especial.</p>
        <p>¡No faltes! 🎉</p>
    </div>

</body>
</html>
